<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Cook with Seamus — Content Manager</title>
</head>
<body>
  <script>
    // When the OAuth popup writes the auth state to localStorage and
    // broadcasts on 'decap-cms-auth', this admin tab listens and
    // reloads so Decap re-initialises with the new user.
    (function () {
      window.addEventListener('storage', function (e) {
        if (e.key === 'decap-cms-user' && e.newValue) {
          window.location.reload();
        }
      });
      try {
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.addEventListener('message', function (event) {
          if (event && event.data && event.data.type === 'auth') {
            window.location.reload();
          }
        });
      } catch (_) {}
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
</body>
</html>
